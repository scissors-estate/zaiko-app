<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アメニティ在庫管理表</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; }
  .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
  .header p { font-size: 13px; color: #666; margin-top: 4px; }
  .status { font-size: 11px; color: #888; padding: 4px 10px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 20px; background: #fff; white-space: nowrap; }
  .status.ok { color: #3B6D11; }
  .status.err { color: #993C1D; border-color: #D85A30; }
  .summary-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .summary-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; padding: 14px 12px; }
  .summary-card .item-name { font-size: 12px; color: #666; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .summary-card .stock-num { font-size: 26px; font-weight: 500; color: #1a1a1a; }
  .summary-card .unit { font-size: 12px; color: #666; margin-top: 2px; }
  .summary-card.low .stock-num { color: #D85A30; }
  .section { background: #fff; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 12px; margin-bottom: 1rem; overflow: hidden; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 0.5px solid rgba(0,0,0,0.1); cursor: pointer; }
  .section-title { font-size: 14px; font-weight: 500; color: #1a1a1a; }
  .section-body { padding: 16px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  select, input[type="date"], input[type="number"] { width: 100%; height: 36px; padding: 0 10px; border: 0.5px solid rgba(0,0,0,0.3); border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 13px; }
  .btn-add { background: #fff; border: 0.5px solid rgba(0,0,0,0.3); border-radius: 8px; padding: 8px 18px; font-size: 13px; color: #1a1a1a; cursor: pointer; }
  .btn-add:hover { background: #f5f5f3; }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-del { background: none; border: none; color: #999; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .btn-del:hover { background: #FAECE7; color: #993C1D; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 8px 10px; text-align: left; font-weight: 500; font-size: 12px; color: #666; border-bottom: 0.5px solid rgba(0,0,0,0.1); background: #f9f9f7; white-space: nowrap; }
  tbody td { padding: 8px 10px; border-bottom: 0.5px solid rgba(0,0,0,0.08); color: #1a1a1a; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #f9f9f7; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-in { background: #EAF3DE; color: #3B6D11; }
  .badge-out { background: #FAECE7; color: #993C1D; }
  .empty { text-align: center; padding: 24px; font-size: 13px; color: #999; }
  .toggle-icon { font-size: 12px; color: #999; }
  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 6px 14px; font-size: 13px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 20px; cursor: pointer; background: #fff; color: #666; }
  .tab.active { background: #f0f0ee; color: #1a1a1a; font-weight: 500; border-color: rgba(0,0,0,0.3); }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>アメニティ在庫管理表</h1>
      <p>アメニティ・消耗品の在庫をまとめて管理（みんなで共有）</p>
    </div>
    <div class="status" id="status">接続中…</div>
  </div>

  <div class="summary-grid" id="summary"></div>

  <div class="section">
    <div class="section-header" onclick="toggleSection('form-section')">
      <span class="section-title">+ 入出庫を記録する</span>
      <span class="toggle-icon" id="form-toggle">▲</span>
    </div>
    <div class="section-body" id="form-section">
      <div class="form-grid">
        <div class="form-group">
          <label>品目</label>
          <select id="f-item">
            <option value="アメニティ袋">アメニティ袋</option>
            <option value="歯ブラシ">歯ブラシ</option>
            <option value="カミソリ">カミソリ</option>
            <option value="コットン">コットン</option>
            <option value="ヘアブラシ">ヘアブラシ</option>
          </select>
        </div>
        <div class="form-group">
          <label>発注日</label>
          <input type="date" id="f-date">
        </div>
        <div class="form-group">
          <label>入庫数</label>
          <input type="number" id="f-in" min="0" value="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>出庫数</label>
          <input type="number" id="f-out" min="0" value="0" placeholder="0">
        </div>
      </div>
      <button class="btn-add" id="btn-add" onclick="addEntry()" disabled>更新</button>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">記録一覧</span>
    </div>
    <div class="section-body" style="padding: 0;">
      <div style="padding: 12px 16px 0;">
        <div class="tabs" id="tabs"></div>
      </div>
      <div id="table-area"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc,
  query, orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCyL6cbxFowIYXQXAcpJuAx6TPHz8B8gYY",
  authDomain:        "minpaku-estate.firebaseapp.com",
  projectId:         "minpaku-estate",
  storageBucket:     "minpaku-estate.firebasestorage.app",
  messagingSenderId: "615279112371",
  appId:             "1:615279112371:web:aed1f361b2ee46240b40c6",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COLLECTION = "zaiko_entries";

const ITEMS = ["アメニティ袋","歯ブラシ","カミソリ","コットン","ヘアブラシ"];
let entries = [];
let activeTab = "全品目";

function setStatus(text, kind) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (kind ? ' ' + kind : '');
}

function calcStock(item) {
  return entries.filter(e => e.item === item).reduce((sum, e) => sum + (e.in||0) - (e.out||0), 0);
}

function renderSummary() {
  const el = document.getElementById('summary');
  el.innerHTML = ITEMS.map(item => {
    const stock = calcStock(item);
    const low = stock < 10;
    return `<div class="summary-card${low?' low':''}">
      <div class="item-name">${item}</div>
      <div style="display:flex;align-items:baseline;gap:4px">
        <div class="stock-num">${stock}</div>
        <div class="unit">個（在庫）</div>
      </div>
      <div class="unit" style="margin-top:4px">1箱：${item==='コットン'?'500':item==='アメニティ袋'?'1000':'250'}個</div>
    </div>`;
  }).join('');
}

function renderTabs() {
  const tabs = ["全品目", ...ITEMS];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<div class="tab${t===activeTab?' active':''}" onclick="setTab('${t}')">${t}</div>`
  ).join('');
}

function renderTable() {
  const filtered = activeTab === "全品目" ? entries : entries.filter(e => e.item === activeTab);
  const el = document.getElementById('table-area');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty">記録がありません</div>';
    return;
  }
  const showItem = activeTab === "全品目";
  el.innerHTML = `<table>
    <thead><tr>
      ${showItem ? '<th>品目</th>' : ''}
      <th>発注日</th>
      <th>入庫</th>
      <th>出庫</th>
      <th>区分</th>
      <th></th>
    </tr></thead>
    <tbody>
      ${filtered.map(e => {
        return `<tr>
          ${showItem ? `<td><strong>${e.item}</strong></td>` : ''}
          <td>${e.date || '-'}</td>
          <td>${e.in || 0}</td>
          <td>${e.out || 0}</td>
          <td>${e.in > 0 && e.out > 0
            ? '<span class="badge badge-in">入庫</span><span class="badge badge-out" style="margin-left:4px">出庫</span>'
            : e.in > 0
              ? '<span class="badge badge-in">入庫</span>'
              : '<span class="badge badge-out">出庫</span>'}</td>
          <td><button class="btn-del" data-id="${e.id}">✕</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  el.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => deleteEntry(btn.dataset.id));
  });
}

function render() {
  renderSummary();
  renderTabs();
  renderTable();
}

async function addEntry() {
  const item = document.getElementById('f-item').value;
  const date = document.getElementById('f-date').value;
  const inVal = parseInt(document.getElementById('f-in').value) || 0;
  const outVal = parseInt(document.getElementById('f-out').value) || 0;
  if (!inVal && !outVal) { alert('入庫数または出庫数を入力してください'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  try {
    await addDoc(collection(db, COLLECTION), {
      item, date, in: inVal, out: outVal,
      createdAt: serverTimestamp(),
    });
    document.getElementById('f-in').value = 0;
    document.getElementById('f-out').value = 0;
  } catch (e) {
    console.error(e);
    alert('保存に失敗しました。通信状況を確認してください。\n' + (e.message || e));
  } finally {
    btn.disabled = false;
  }
}

async function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  try {
    await deleteDoc(doc(db, COLLECTION, id));
  } catch (e) {
    console.error(e);
    alert('削除に失敗しました。\n' + (e.message || e));
  }
}

function setTab(tab) {
  activeTab = tab;
  renderTabs();
  renderTable();
}

function toggleSection(id) {
  const el = document.getElementById(id);
  const icon = document.getElementById('form-toggle');
  if (el.style.display === 'none') {
    el.style.display = '';
    icon.textContent = '▲';
  } else {
    el.style.display = 'none';
    icon.textContent = '▼';
  }
}

window.addEntry = addEntry;
window.setTab = setTab;
window.toggleSection = toggleSection;

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

const q = query(collection(db, COLLECTION), orderBy('createdAt', 'desc'));
onSnapshot(q, snap => {
  entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  render();
  setStatus('同期中 ✓', 'ok');
  document.getElementById('btn-add').disabled = false;
}, err => {
  console.error(err);
  setStatus('接続エラー', 'err');
  alert('データ取得に失敗しました。\nセキュリティルールが正しく設定されているか確認してください。\n\n' + (err.message || err));
});

render();
</script>
</body>
</html>
